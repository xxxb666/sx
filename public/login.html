<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 徐小泡的专属空间</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="avatar-circle">
                    <span>👩‍💻</span>
                </div>
                <h1>管理员登录</h1>
                <p>欢迎回来，请验证身份</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">账号</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="请输入管理员账号" autocomplete="username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">立即登录</span>
                        <span class="btn-loader"></span>
                    </button>
                    <a href="index.html" class="back-link">返回主页</a>
                </div>
            </form>

            <div id="errorMessage" class="error-message"></div>
        </div>
        
        <div class="background-decorations">
            <span class="decor item-1">✨</span>
            <span class="decor item-2">💖</span>
            <span class="decor item-3">🎀</span>
            <span class="decor item-4">🌟</span>
        </div>
    </div>

    <script src="js/api.js?v=54"></script>
    <script src="js/login-page.js?v=54"></script>
</body>
</html>
